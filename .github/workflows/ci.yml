name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm install
      - run: npx prisma generate
      - run: npm run build

  web:
    name: Web · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm install
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  e2e:
    name: E2E · smoke
    runs-on: ubuntu-latest
    needs: [api, web]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: community
          POSTGRES_PASSWORD: community
          POSTGRES_DB: community
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U community"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://community:community@localhost:5432/community?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-not-used-in-prod
      TOKEN_ENCRYPTION_KEY: '00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff'
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      UPLOAD_DIR: /tmp/community-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install api
        working-directory: apps/api
        run: npm install
      - name: Migrate db
        working-directory: apps/api
        run: npx prisma migrate deploy && npx prisma generate
      - name: Build api
        working-directory: apps/api
        run: npm run build
      - name: Install web
        working-directory: apps/web
        run: npm install
      - name: Build web
        working-directory: apps/web
        run: npm run build
      - name: Start api
        working-directory: apps/api
        run: nohup node dist/main.js > api.log 2>&1 &
      - name: Start web
        working-directory: apps/web
        run: nohup npm start > web.log 2>&1 &
      - name: Wait for services
        run: |
          for i in {1..30}; do
            curl -fs http://localhost:3001/health && curl -fs http://localhost:3000 && break
            sleep 2
          done
      - name: Install playwright
        working-directory: e2e
        run: npm install && npx playwright install --with-deps chromium
      - name: Run e2e
        working-directory: e2e
        run: npm test
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
